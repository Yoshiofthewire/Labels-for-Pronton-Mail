services:
  lumo-lab:
    build: .
    container_name: lumo-lab
    ports:
      - "5866:5866"
    environment:
      WEB_PORT: 5866
      TZ: ${TZ:-America/New_York}
      PROTON_API_HOST: ${PROTON_API_HOST:-}
      PROTON_USERNAME: ${PROTON_USERNAME:-}
      PROTON_PASSWORD: ${PROTON_PASSWORD:-}
      PROTON_TOTP: ${PROTON_TOTP:-}
      PROTON_UID: ${PROTON_UID:-}
      PROTON_ACCESS_TOKEN: ${PROTON_ACCESS_TOKEN:-}
      PROTON_REFRESH_TOKEN: ${PROTON_REFRESH_TOKEN:-}
      LUMO_API_KEY: ${LUMO_API_KEY}
      LUMO_BASE_URL: ${LUMO_BASE_URL:-http://127.0.0.1:3333}
      LUMO_LOCAL_ENABLED: ${LUMO_LOCAL_ENABLED:-true}
      LUMO_AUTH_FILE: ${LUMO_AUTH_FILE:-/lumo_lab/config/lumo-auth.json}
      TUNING_FILE: ${TUNING_FILE:-/lumo_lab/config/TUNING.md}
    volumes:
      - lumo_config:/lumo_lab/config
      - lumo_logs:/lumo_lab/logs
      - lumo_state:/lumo_lab/state
    restart: unless-stopped

volumes:
  lumo_config:
  lumo_logs:
  lumo_state:
